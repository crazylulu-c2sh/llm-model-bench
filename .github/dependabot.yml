version: 2
# 버전 업데이트(version updates)는 비활성화하고 보안 업데이트(security updates)에만 반응.
# open-pull-requests-limit: 0 → 해당 생태계의 버전 업데이트 PR을 끔.
# 보안 업데이트는 이 설정의 영향을 받지 않으며, 별도 내부 한도(10개)로 계속 동작함.
# (단, 보안 업데이트 자체는 저장소 Settings → Code security → "Dependabot security updates" 토글이 켜져 있어야 함)
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "docker"]

  # github-actions만 버전 업데이트를 켬 (npm·docker의 security-only 정책과 의도적으로 다름).
  # 이유: 액션 런타임 폐기(예: node20 강제 제거)는 '보안 업데이트'가 아니라 '버전 업데이트'라
  #       limit:0으로는 못 잡음. 그런 deprecation을 사전에 자동 감지하는 게 이 항목의 목적.
  # 노이즈 억제: groups로 한 달치 액션 범프를 PR 1건에 모음.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "github-actions"]
    groups:
      github-actions:
        patterns: ["*"]
