name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # 수동 재실행용

# 같은 ref의 이전 실행은 취소 (PR 재푸시 / main 재푸시).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한: 리포 읽기 + 실패 시 아티팩트 업로드만 (업로드는 contents:write 불필요).
permissions:
  contents: read

jobs:
  build-check:
    name: typecheck · build · test · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25 # 첫 실행(playwright --with-deps apt + e2e webServer 180s + retries) 여유
    steps:
      - uses: actions/checkout@v7

      # pnpm을 먼저 설치해야 setup-node의 `cache: pnpm`이 store 경로를 찾음.
      # action-setup@v6은 package.json의 packageManager(pnpm@11.1.1)를 읽음 — with.version 주지 말 것.
      # (v6은 node24 런타임 + pnpm v11 공식 지원. node20 강제 실행 경고 해소용으로 v4→v6 범프.)
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc # 24.12.0 정확히 핀 (engine-strict 충족)
          cache: pnpm

      # frozen install: root postinstall이 @llm-bench/shared를 dist로 빌드, sharp/esbuild 스크립트 실행.
      # --ignore-scripts 쓰지 말 것 (shared dist 없으면 server 유닛/타입체크가 깨짐).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck # tsc --noEmit ×3 (타입 레벨 회귀 — transpile-only 빌드가 못 잡는 부분)
        run: pnpm run typecheck

      - name: Build # shared → server(verify-bundle node:sqlite 가드) → web
        run: pnpm run build

      - name: Unit tests # Vitest 전체 (LLM_JUDGE_ENABLED 설정 금지 — judge 경로 비활성)
        run: pnpm run test

      - name: Install Playwright (Chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests # playwright.config가 CI에서 forbidOnly/retries=2/workers=1 적용
        run: pnpm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  docker:
    name: docker build (api · web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # 두 타깃은 Dockerfile의 공용 `build` 스테이지를 공유 → gha 캐시로 재사용.
      # push:false — PR 게이트용 빌드 검증만 (base image 범프 회귀 감지).
      - name: Build api image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
