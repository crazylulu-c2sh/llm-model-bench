services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      PORT: "20080"
      BENCH_DB_PATH: /data/bench.sqlite
    volumes:
      - bench_data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  bench_data:
